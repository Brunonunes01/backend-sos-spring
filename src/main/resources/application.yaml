spring:
  application:
    name: sos
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sos_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:sua_chave_secreta_aqui_minimo_256bits_sua_chave_secreta_aqui}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8081}
